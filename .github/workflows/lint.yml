---
name: Lint

on:
  pull_request:
  workflow_dispatch:

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - run: npm ci

      - run: make -k -j lint
